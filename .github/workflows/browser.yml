name: Package Browser Extension

on:
  push:
    branches:
      - main
    paths:
      - 'browser-extension/**'
      - 'shared/**'
      - 'sync-shared.js'
      - '.github/workflows/browser.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-browser:
    name: Package Browser Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync Shared Folder (Copy Mode)
        run: node sync-shared.js --copy

      - name: Package ZIP
        run: |
          cd browser-extension
          zip -r ../identabar-browser-extension.zip . -x "*.git*" "*.github*"

      - name: Upload Browser Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: identabar-browser-extension
          path: identabar-browser-extension.zip
